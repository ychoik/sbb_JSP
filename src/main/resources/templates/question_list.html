<table>
    <thead>
    <tr>
        <th>제목</th>
        <th>작성일시</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:는 타임리프 속성, 이 부분이 자바 코드와 연결됨  -->
    <tr th:each="question, index : ${questionList}"><!--Model 객체에 저장한 questionList 데이터를 하나씩 꺼내 question변수에 대입한 후 길이만큼 반복하며 <tr> ... </tr> 문장을 출력-->

        <!--<td th:text="${question.subject}"></td>-->
        <td>
            <a th:href="@{|/question/detail/${question.id}|}" th:text="${question.subject}"></a>
        </td>
        <!--질문 목록의 제목을 텍스트로 출력하던 것에서 질문의 상세 내용이 담긴 웹 페이지로 이동할 수 있는 링크로 변경
            제목에 상세 페이지 URL을 연결하기 위해 타임리프의 th: href속성 사용. 이때 URL은 반드시 @{와 }문자 사이에 입력해야 함.
                    문자열 /question/detail/과 ${question.id} 값이 조합되어 /question/detail/${question.id}로 작성
                    타임리프에서는 /question/detail/과 같은 문자열과 ${question.id}와 같은 자바 객체의 값을 더할 때는 반드시 다음처럼 |로 좌우를 감싸 주어야 한다.
        -->

        <td th:text="${question.createDate}"></td>
    </tr>
    </tbody>
</table>
